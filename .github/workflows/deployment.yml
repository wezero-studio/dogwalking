name: CI + Vercel Full Auto Deploy

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: 24

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm run test --if-present

      - name: Build
        run: npm run build

  deploy:
    name: Deploy via Vercel CLI (Auto Project Creation)
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Auto Create Project)
        run: |
          vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --prod
